<!DOCTYPE html>
<html lang="en">

<head>

    <title>Document</title>
    <link rel="stylesheet" href="./src/output.css">
</head>

<body class="m-0 p-0 bg-black">
    <div id="backgorundV" class="!fixed !w-full"></div>
    <div style="height: 1600vh;"></div>
</body>
<script src="https://cdn.jsdelivr.net/npm/scrolly-video@latest/dist/scrolly-video.js"></script>

<script type="text/javascript">
    window.onload = function () {
        let video = document.querySelector("#backgorundV");
        let scrollyVideo = new ScrollyVideo({
            scrollyVideoContainer: "backgorundV",
            src: "./background/lv_0_٢٠٢٦٠٦٢٣٠٢٢٣٢٩_4.mp4",
        });
   video.querySelector('video').remove();

    let settime = setInterval(() => {
        if(video.querySelector('video')){
            video.querySelector('video').remove();
        }

        if(video.querySelector('canvas')){
            clearInterval(settime);
            video.querySelector('canvas').classList.add('!object-cover');
            alert('canvas');
        }
    }, 1000);
    };

</script>

</html>
